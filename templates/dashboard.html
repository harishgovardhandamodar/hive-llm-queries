<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hive LLM Queries Dashboard</title>
<script src="/static/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  overflow: hidden;
  height: 100vh;
}
a { color: #58a6ff; text-decoration: none; }
a:hover { text-decoration: underline; }

/* Layout */
.app { display: flex; height: 100vh; }
.sidebar {
  width: 340px;
  min-width: 340px;
  background: #161b22;
  border-right: 1px solid #30363d;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.main { flex: 1; display: flex; flex-direction: column; position: relative; }

/* Sidebar Header */
.sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid #30363d;
}
.sidebar-header h1 {
  font-size: 18px;
  font-weight: 700;
  color: #f0f6fc;
}
.sidebar-header p {
  font-size: 12px;
  color: #8b949e;
  margin-top: 2px;
}

/* Stats */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px solid #30363d;
}
.stat-card {
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 8px 12px;
  text-align: center;
}
.stat-card .value {
  font-size: 20px;
  font-weight: 700;
  color: #f0f6fc;
}
.stat-card .label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #8b949e;
  margin-top: 2px;
}

/* Filters */
.filters {
  padding: 12px 16px;
  border-bottom: 1px solid #30363d;
}
.filters h3 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #8b949e;
  margin-bottom: 8px;
}
.filter-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.filter-tag {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 12px;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid #30363d;
  background: transparent;
  color: #c9d1d9;
  transition: all 0.15s;
}
.filter-tag:hover { border-color: #58a6ff; color: #58a6ff; }
.filter-tag.active {
  background: #1f6feb;
  border-color: #1f6feb;
  color: #fff;
}
.filter-tag.active:hover { background: #388bfd; border-color: #388bfd; }

/* Search */
.search-box {
  padding: 8px 16px;
  border-bottom: 1px solid #30363d;
}
.search-box input {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid #30363d;
  border-radius: 6px;
  background: #0d1117;
  color: #c9d1d9;
  font-size: 13px;
  outline: none;
}
.search-box input:focus { border-color: #58a6ff; }

/* Conversation list */
.conv-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.conv-item {
  padding: 10px 16px;
  cursor: pointer;
  border-bottom: 1px solid #21262d;
  transition: background 0.15s;
}
.conv-item:hover { background: #1c2128; }
.conv-item.active { background: #1f6feb22; border-left: 3px solid #1f6feb; }
.conv-item h4 {
  font-size: 13px;
  font-weight: 600;
  color: #f0f6fc;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.conv-item .conv-meta {
  font-size: 11px;
  color: #8b949e;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.conv-item .conv-meta span {
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.conv-item .conv-summary {
  font-size: 11px;
  color: #8b949e;
  margin-top: 3px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.tag-small {
  display: inline-block;
  padding: 1px 5px;
  border-radius: 8px;
  font-size: 10px;
  background: #21262d;
  color: #8b949e;
}

/* Graph area */
.graph-container {
  flex: 1;
  position: relative;
}
.graph-container svg { width: 100%; height: 100%; }

/* Tooltip */
.tooltip {
  position: absolute;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 12px 16px;
  pointer-events: none;
  max-width: 360px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 100;
  font-size: 13px;
}
.tooltip h3 { font-size: 14px; color: #f0f6fc; margin-bottom: 4px; }
.tooltip p { font-size: 12px; color: #8b949e; }
.tooltip .tt-meta { font-size: 11px; margin-top: 4px; }

/* Detail panel */
.detail-panel {
  position: absolute;
  right: 0;
  top: 0;
  width: 420px;
  height: 100%;
  background: #161b22;
  border-left: 1px solid #30363d;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  z-index: 50;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.detail-panel.open { transform: translateX(0); }
.detail-header {
  padding: 16px 20px;
  border-bottom: 1px solid #30363d;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.detail-header h2 { font-size: 16px; color: #f0f6fc; }
.detail-close {
  background: none;
  border: none;
  color: #8b949e;
  cursor: pointer;
  font-size: 20px;
  padding: 4px;
}
.detail-close:hover { color: #f0f6fc; }
.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}
.detail-body .msg {
  margin-bottom: 16px;
  padding: 12px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.5;
}
.detail-body .msg.user {
  background: #1f6feb22;
  border: 1px solid #1f6feb33;
}
.detail-body .msg.assistant {
  background: #21262d;
  border: 1px solid #30363d;
}
.detail-body .msg .msg-role {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #8b949e;
  margin-bottom: 4px;
}
.detail-body .msg .msg-content {
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 200px;
  overflow-y: auto;
}
.detail-body .msg .msg-content::-webkit-scrollbar { width: 4px; }
.detail-body .msg .msg-content::-webkit-scrollbar-track { background: transparent; }
.detail-body .msg .msg-content::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

/* Legend */
.legend {
  position: absolute;
  bottom: 16px;
  left: 16px;
  background: #161b22ee;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 11px;
  z-index: 10;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 3px 0;
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Controls hint */
.controls-hint {
  position: absolute;
  bottom: 16px;
  right: 16px;
  font-size: 11px;
  color: #8b949e;
  background: #161b22ee;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 8px 12px;
  z-index: 10;
}

/* Loading */
.loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0d1117;
  z-index: 200;
}
.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid #30363d;
  border-top-color: #58a6ff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

/* Node type colors */
.node-conversation { fill: #58a6ff; }
.node-topic { fill: #3fb950; }
.node-concept { fill: #d29922; }
.node-intent { fill: #f85149; }
.node-model { fill: #bc8cff; }
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>LLM Queries Dashboard</h1>
      <p>Knowledge graph of conversation history</p>
    </div>

    <div class="stats-grid" id="stats">
      <div class="stat-card"><div class="value" id="stat-convs">-</div><div class="label">Conversations</div></div>
      <div class="stat-card"><div class="value" id="stat-topics">-</div><div class="label">Topics</div></div>
      <div class="stat-card"><div class="value" id="stat-concepts">-</div><div class="label">Concepts</div></div>
      <div class="stat-card"><div class="value" id="stat-models">-</div><div class="label">Models</div></div>
    </div>

    <div class="search-box">
      <input type="text" id="search" placeholder="Search conversations..." />
    </div>

    <div class="filters" id="intent-filters">
      <h3>Intent</h3>
      <div class="filter-tags" id="intent-tags"></div>
    </div>

    <div class="filters" id="model-filters">
      <h3>Model</h3>
      <div class="filter-tags" id="model-tags"></div>
    </div>

    <div class="conv-list" id="conv-list"></div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="graph-container" id="graph-container">
      <div class="loading" id="loading"><div class="loading-spinner"></div></div>
      <svg id="graph-svg"></svg>
      <div class="legend" id="legend">
        <div class="legend-item"><span class="legend-dot node-conversation"></span>Conversation</div>
        <div class="legend-item"><span class="legend-dot node-topic"></span>Topic</div>
        <div class="legend-item"><span class="legend-dot node-concept"></span>Concept</div>
        <div class="legend-item"><span class="legend-dot node-intent"></span>Intent</div>
        <div class="legend-item"><span class="legend-dot node-model"></span>Model</div>
      </div>
      <div class="controls-hint">Scroll to zoom · Drag to pan · Drag nodes</div>
    </div>

    <!-- Detail Panel -->
    <div class="detail-panel" id="detail-panel">
      <div class="detail-header">
        <h2 id="detail-title">Conversation Detail</h2>
        <button class="detail-close" onclick="closeDetail()">&times;</button>
      </div>
      <div class="detail-body" id="detail-body"></div>
    </div>
  </main>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────
let graphData = null;
let activeFilters = { intent: new Set(), model: new Set() };
let simulation = null;
let selectedConvId = null;
let searchTerm = '';

// ── Load data ────────────────────────────────────────────────────────────
async function loadData() {
  const resp = await fetch('/api/graph');
  graphData = await resp.json();
  document.getElementById('loading').style.display = 'none';
  render();
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  renderStats();
  renderFilters();
  renderConvList();
  renderGraph();
}

function renderStats() {
  const s = graphData.stats;
  document.getElementById('stat-convs').textContent = s.conversations;
  document.getElementById('stat-topics').textContent = s.topics;
  document.getElementById('stat-concepts').textContent = s.concepts;
  document.getElementById('stat-models').textContent = s.models.length;
}

// ── Filters ───────────────────────────────────────────────────────────────
function renderFilters() {
  const intents = new Set();
  const models = new Set();
  for (const c of graphData.conversations) {
    if (c.intent) intents.add(c.intent);
    for (const m of c.models) models.add(m);
  }

  renderTagGroup('intent-tags', [...intents].sort(), 'intent');
  renderTagGroup('model-tags', [...models].sort(), 'model');
}

function renderTagGroup(containerId, items, type) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  const all = document.createElement('span');
  all.className = 'filter-tag' + (activeFilters[type].size === 0 ? ' active' : '');
  all.textContent = 'All';
  all.onclick = () => {
    activeFilters[type].clear();
    refreshFilters();
  };
  container.appendChild(all);
  for (const item of items) {
    const tag = document.createElement('span');
    tag.className = 'filter-tag' + (activeFilters[type].has(item) ? ' active' : '');
    tag.textContent = item;
    tag.onclick = () => {
      if (activeFilters[type].has(item)) activeFilters[type].delete(item);
      else activeFilters[type].add(item);
      refreshFilters();
    };
    container.appendChild(tag);
  }
}

function refreshFilters() {
  document.querySelectorAll('#intent-tags .filter-tag').forEach((el, i) => {
    const items = [...new Set(graphData.conversations.map(c => c.intent))].sort();
    if (i === 0) el.className = 'filter-tag' + (activeFilters.intent.size === 0 ? ' active' : '');
    else el.className = 'filter-tag' + (activeFilters.intent.has(items[i-1]) ? ' active' : '');
  });
  document.querySelectorAll('#model-tags .filter-tag').forEach((el, i) => {
    const items = [...new Set(graphData.conversations.flatMap(c => c.models))].sort();
    if (i === 0) el.className = 'filter-tag' + (activeFilters.model.size === 0 ? ' active' : '');
    else el.className = 'filter-tag' + (activeFilters.model.has(items[i-1]) ? ' active' : '');
  });
  renderConvList();
  updateGraphVisibility();
}

// ── Conversation list ─────────────────────────────────────────────────────
function renderConvList() {
  const list = document.getElementById('conv-list');
  list.innerHTML = '';
  const filtered = getFilteredConvs();
  for (const c of filtered) {
    const item = document.createElement('div');
    item.className = 'conv-item' + (c.id === selectedConvId ? ' active' : '');
    item.dataset.convId = c.id;
    item.innerHTML = `
      <h4>${esc(c.title)}</h4>
      <div class="conv-meta">
        <span>${c.model}</span>
        <span class="tag-small">${c.intent}</span>
        ${c.topics.slice(0, 2).map(t => `<span class="tag-small">${esc(t)}</span>`).join('')}
      </div>
      <div class="conv-summary">${esc(c.summary)}</div>
    `;
    item.onclick = () => selectConversation(c.id);
    list.appendChild(item);
  }
}

function getFilteredConvs() {
  let convs = graphData.conversations;
  if (activeFilters.intent.size > 0) {
    convs = convs.filter(c => activeFilters.intent.has(c.intent));
  }
  if (activeFilters.model.size > 0) {
    convs = convs.filter(c => c.models.some(m => activeFilters.model.has(m)));
  }
  if (searchTerm) {
    const t = searchTerm.toLowerCase();
    convs = convs.filter(c =>
      c.title.toLowerCase().includes(t) ||
      c.summary.toLowerCase().includes(t) ||
      c.topics.some(tp => tp.toLowerCase().includes(t)) ||
      c.concepts.some(cp => cp.toLowerCase().includes(t))
    );
  }
  return convs;
}

// ── Graph ─────────────────────────────────────────────────────────────────
function renderGraph() {
  const container = document.getElementById('graph-container');
  const width = container.clientWidth;
  const height = container.clientHeight;

  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();
  svg.attr('width', width).attr('height', height);

  const g = svg.append('g');

  // Zoom
  const zoom = d3.zoom()
    .scaleExtent([0.2, 4])
    .on('zoom', (event) => g.attr('transform', event.transform));
  svg.call(zoom);

  // Build graph from data
  const nodes = graphData.nodes.map(n => ({
    ...n,
    nodeType: getNodeType(n),
    r: getNodeRadius(n),
  }));
  const links = graphData.links.map(l => ({
    source: l.source,
    target: l.target,
    relation: l.relation,
  }));

  // Simulation
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(80))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => d.r + 8));

  // Links
  const link = g.append('g')
    .selectAll('line')
    .data(links)
    .join('line')
    .attr('stroke', '#30363d')
    .attr('stroke-width', 1)
    .attr('stroke-opacity', 0.4);

  // Nodes
  const node = g.append('g')
    .selectAll('circle')
    .data(nodes)
    .join('circle')
    .attr('r', d => d.r)
    .attr('fill', d => getNodeColor(d))
    .attr('stroke', '#0d1117')
    .attr('stroke-width', 1.5)
    .attr('opacity', d => isNodeVisible(d) ? 1 : 0.08)
    .style('cursor', 'pointer')
    .call(d3.drag()
      .on('start', (event, d) => {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
      })
      .on('drag', (event, d) => {
        d.fx = event.x;
        d.fy = event.y;
      })
      .on('end', (event, d) => {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
      })
    )
    .on('click', (event, d) => {
      event.stopPropagation();
      if (d.nodeType === 'conversation') {
        selectConversation(d.id);
      }
    })
    .on('mouseenter', (event, d) => showTooltip(event, d))
    .on('mouseleave', () => hideTooltip());

  // Labels
  const label = g.append('g')
    .selectAll('text')
    .data(nodes)
    .join('text')
    .text(d => d.label.length > 20 ? d.label.slice(0, 18) + '..' : d.label)
    .attr('font-size', d => Math.max(8, d.r * 0.5))
    .attr('fill', '#8b949e')
    .attr('text-anchor', 'middle')
    .attr('dy', d => d.r + 12)
    .attr('opacity', d => isNodeVisible(d) ? 0.8 : 0);

  // Title labels for conversation nodes
  const titleLabels = g.append('g')
    .selectAll('text.title-label')
    .data(nodes.filter(d => d.nodeType === 'conversation'))
    .join('text')
    .text(d => d.label.length > 25 ? d.label.slice(0, 23) + '..' : d.label)
    .attr('font-size', 7)
    .attr('fill', '#58a6ff')
    .attr('text-anchor', 'middle')
    .attr('dy', d => -(getNodeRadius(d) + 2))
    .attr('opacity', d => isNodeVisible(d) ? 0.9 : 0);

  // Tick
  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    node
      .attr('cx', d => d.x)
      .attr('cy', d => d.y);
    label
      .attr('x', d => d.x)
      .attr('y', d => d.y);
    titleLabels
      .attr('x', d => d.x)
      .attr('y', d => d.y);
  });

  // Click background to deselect
  svg.on('click', () => {
    closeDetail();
    selectedConvId = null;
    document.querySelectorAll('.conv-item.active').forEach(el => el.classList.remove('active'));
  });
}

function getNodeType(n) {
  if (n.type === 'paper' || n.type === 'graph_paper') return 'conversation';
  if (n.concept_type === 'topic') return 'topic';
  if (n.concept_type === 'intent') return 'intent';
  if (n.concept_type === 'model') return 'model';
  return 'concept';
}

function getNodeColor(d) {
  switch (d.nodeType) {
    case 'conversation': return '#58a6ff';
    case 'topic': return '#3fb950';
    case 'concept': return '#d29922';
    case 'intent': return '#f85149';
    case 'model': return '#bc8cff';
    default: return '#8b949e';
  }
}

function getNodeRadius(d) {
  switch (d.nodeType) {
    case 'conversation': return 14;
    case 'topic': return 8;
    case 'concept': return 6;
    case 'intent': return 10;
    case 'model': return 8;
    default: return 6;
  }
}

function isNodeVisible(d) {
  if (d.nodeType !== 'conversation') return true;
  const conv = graphData.conversations.find(c => c.id === d.id);
  if (!conv) return false;
  if (searchTerm) {
    const t = searchTerm.toLowerCase();
    if (!conv.title.toLowerCase().includes(t) &&
        !conv.summary.toLowerCase().includes(t)) return false;
  }
  if (activeFilters.intent.size > 0 && !activeFilters.intent.has(conv.intent)) return false;
  if (activeFilters.model.size > 0 && !conv.models.some(m => activeFilters.model.has(m))) return false;
  return true;
}

function updateGraphVisibility() {
  const svg = d3.select('#graph-svg');
  svg.selectAll('circle').attr('opacity', d => isNodeVisible(d) ? 1 : 0.08);
  svg.selectAll('text').attr('opacity', d => isNodeVisible(d) ? 0.8 : 0);
  svg.selectAll('text.title-label').attr('opacity', d => isNodeVisible(d) ? 0.9 : 0);
}

// ── Tooltip ───────────────────────────────────────────────────────────────
function showTooltip(event, d) {
  const tip = d3.select('body').append('div').attr('class', 'tooltip');
  let html = `<h3>${esc(d.label)}</h3>`;
  html += `<p class="tt-meta">Type: ${d.nodeType}</p>`;
  if (d.nodeType === 'conversation') {
    const conv = graphData.conversations.find(c => c.id === d.id);
    if (conv) {
      html += `<p>${esc(conv.summary)}</p>`;
      html += `<p class="tt-meta">Model: ${conv.model} · Intent: ${conv.intent}</p>`;
      if (conv.topics.length) html += `<p class="tt-meta">Topics: ${conv.topics.join(', ')}</p>`;
    }
  } else if (d.definition) {
    html += `<p>${esc(d.definition)}</p>`;
  }
  tip.html(html)
    .style('left', (event.pageX + 12) + 'px')
    .style('top', (event.pageY - 10) + 'px');
}

function hideTooltip() {
  d3.selectAll('.tooltip').remove();
}

// ── Detail Panel ──────────────────────────────────────────────────────────
async function selectConversation(convId) {
  selectedConvId = convId;
  // Update list
  document.querySelectorAll('.conv-item.active').forEach(el => el.classList.remove('active'));
  const listItem = document.querySelector(`.conv-item[data-conv-id="${convId}"]`);
  if (listItem) listItem.classList.add('active');
  // Show detail
  const panel = document.getElementById('detail-panel');
  const title = document.getElementById('detail-title');
  const body = document.getElementById('detail-body');
  title.textContent = 'Loading...';
  body.innerHTML = '';
  panel.classList.add('open');

  try {
    const resp = await fetch(`/api/conversation/${convId}`);
    const data = await resp.json();
    title.textContent = data.title || 'Conversation';
    body.innerHTML = '<div style="margin-bottom:12px;font-size:12px;color:#8b949e;">' +
      `Model: ${(data.models||[]).join(', ')} · ${new Date(data.created_at * 1000).toLocaleDateString()}</div>`;
    for (const msg of data.messages) {
      const div = document.createElement('div');
      div.className = 'msg ' + msg.role;
      const content = msg.content || '(empty)';
      div.innerHTML = `<div class="msg-role">${msg.role} ${msg.model ? '· ' + msg.model : ''}</div>
        <div class="msg-content">${esc(content)}</div>`;
      body.appendChild(div);
    }
  } catch (e) {
    body.innerHTML = '<p style="color:#f85149;">Failed to load conversation.</p>';
  }
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  selectedConvId = null;
  document.querySelectorAll('.conv-item.active').forEach(el => el.classList.remove('active'));
}

// ── Search ────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderConvList();
  updateGraphVisibility();
});

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Init ──────────────────────────────────────────────────────────────────
loadData().catch(err => {
  console.error('Dashboard error:', err);
  document.getElementById('loading').innerHTML =
    `<div style="color:#f85149;text-align:center;padding:40px;">
      <h3>Failed to load dashboard</h3>
      <p style="margin-top:8px;font-size:13px;">${esc(err.message || String(err))}</p>
      <button onclick="location.reload()" style="margin-top:16px;padding:8px 20px;border:1px solid #30363d;border-radius:6px;background:#21262d;color:#c9d1d9;cursor:pointer;">Retry</button>
    </div>`;
});
</script>
</body>
</html>
