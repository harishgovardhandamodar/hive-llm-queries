version: "3.9"

services:
  dashboard:
    build: .
    container_name: hive-llm-dashboard
    ports:
      - "5001:5001"
    volumes:
      - ./chatHistory:/app/chatHistory
      - ./.extraction_cache.json:/app/.extraction_cache.json
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
